<!DOCTYPE html>

<html lang="en"><head>

<title>Custom Recipe Builder</title>

                        "inverse-surface": "#213145",
                        "on-tertiary-container": "#003d88",
                        "on-secondary": "#ffffff",

                    "fontSize": {
                        "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400"}],

            },

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Lexend', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-white dark:bg-gray-900 border-b border-gray-100 dark:border-gray-800 shadow-sm dark:shadow-none z-50">
<div class="flex items-center justify-between px-4 h-16 w-full">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden">
<img alt="User profile" class="w-full h-full object-cover" data-alt="minimalist user avatar placeholder with a soft grey background and clean aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCdWanyh6BKTbGnKkwClp1gO3UWkG7_WO8TissJtTKDW6VRSp7nh82Gi19WbNhUV53hP_hCtYezBuMgzC1HVNFN-YGni7gex6f2QN_Ai7DW-YoQECxJU7HQmpeES-VmD80i-Urzc7UrdzfdAF9Ad0ufblytVp5PDrKzzc9Ck9CRgqoXsCq9BOnOOA_Rp-YmqTmiagh2IiTewMAcUeLtW_a95FirnOWNow_yV0N3-iX81qsqkH3hueYhkohwchNAI9BVi_fEvvEb9yE"/>
</div>
<h1 class="text-xl font-semibold text-green-600 dark:text-green-500 font-lexend">MacroTrack</h1>
</div>
<div class="flex items-center gap-4">
<button class="text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</div>
</header>
<main class="px-margin-mobile pt-lg max-w-2xl mx-auto">
<!-- Recipe Title Section -->
<div class="mb-xl">
<label class="block font-label-sm text-label-sm text-outline mb-xs">Recipe Name</label>
<input class="w-full bg-white border border-outline-variant rounded-xl px-md py-md font-headline-md text-headline-md focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all placeholder:text-surface-dim" placeholder="Enter recipe name..." type="text" value="Garden Pesto Pasta"/>
</div>
<!-- Ingredient List Section -->
<div class="space-y-md">
<div class="flex justify-between items-center mb-sm">
<h2 class="font-headline-md text-body-lg font-bold text-on-background">Ingredients</h2>
<span class="text-label-sm font-label-sm text-outline">3 items</span>
</div>
<!-- Bento-style Ingredient Cards -->
<div class="grid grid-cols-1 gap-md">
<!-- Row 1 -->
<div class="bg-surface-container-lowest p-md rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.04)] flex items-center gap-md border border-transparent hover:border-primary-container transition-all">
<div class="w-12 h-12 rounded-lg bg-surface-container overflow-hidden flex-shrink-0">
<img alt="Pasta" class="w-full h-full object-cover" data-alt="top view of whole wheat fusilli pasta on a white ceramic plate with bright natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC-FEdIxiF80RdELwmePkWDkpcUompMC9M3FdL_jEos2Gd3Yb3kyHPQcPiI3X4pdfijuu3gs2iMZ-bON1uvtFoVVIAitdQnM9p_nzcjIU5KbMf_qqefUKA_ozKHlA1s-n8RTY9_6jrYFjBZTrUT5UdThyoWwov5P8suN0SLOe-bIr76eI5wo37iS6ZEpXvY3tn_VGWCh6wd_v5VqWOPt8wZirET1JWU5ldhrG_zgDCE7G5tvxp4O0emw3wrRe4qA8ASuxznSeL4YYI"/>
</div>
<div class="flex-grow">
<p class="font-body-lg text-body-lg font-semibold">Whole Wheat Pasta</p>
<p class="font-body-md text-label-sm text-outline">100g • 350 kcal</p>
</div>
<div class="flex flex-col items-end">
<span class="material-symbols-outlined text-outline cursor-pointer hover:text-error transition-colors" data-icon="close">close</span>
</div>
</div>
<!-- Row 2 -->
<div class="bg-surface-container-lowest p-md rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.04)] flex items-center gap-md border border-transparent hover:border-primary-container transition-all">
<div class="w-12 h-12 rounded-lg bg-surface-container overflow-hidden flex-shrink-0">
<img alt="Pesto" class="w-full h-full object-cover" data-alt="vibrant green fresh basil pesto in a small wooden bowl with a few pine nuts around it" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC1oIGl0jLKAtq3Osv5SzFBLmnytqBFdW7DTyM4Qa34bm2010TjMkdG9hkEsfRUmYJ37v2b_iaAE-WPFMnRoOs9KyvOOMl9Ytp9vWPG03V2Ia8W2qxM1z55ALf-ztPeuT1VqpGobZQfyMEgNXy1JQgmT9vi7YX4g6juJ0lVzqU6zLgoCl2O3WhxHK-6EcQGQBzyHH6GO9YkB1DsrLvlzufPG9k9z83GI2tll1-XGZEQAnd17ptUV5Zy76yJ3gArWJu4WKs8MS1RAlo"/>
</div>
<div class="flex-grow">
<p class="font-body-lg text-body-lg font-semibold">Basil Pesto</p>
<p class="font-body-md text-label-sm text-outline">30g • 120 kcal</p>
</div>
<div class="flex flex-col items-end">
<span class="material-symbols-outlined text-outline cursor-pointer hover:text-error transition-colors" data-icon="close">close</span>
</div>
</div>
<!-- Row 3 -->
<div class="bg-surface-container-lowest p-md rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.04)] flex items-center gap-md border border-transparent hover:border-primary-container transition-all">
<div class="w-12 h-12 rounded-lg bg-surface-container overflow-hidden flex-shrink-0">
<img alt="Tomatoes" class="w-full h-full object-cover" data-alt="bright red cherry tomatoes cut in halves on a clean white surface with fresh water droplets" src="https://lh3.googleusercontent.com/aida-public/AB6AXuApUZ2KyWCFZbDpxxvaXPHdXXFV-9mX2srELBOSBIbe4Euv804QEg0Y168xqyxfI1y94T0Mk_C41SCVcbcX9gnjTCeUW6FBFaBRmOEcT1-YrHeNOgQTVgb5dAiN-ireI3lKhSrniiL9qghVahj5tXZ2ugjGRuQu7ycDExniLHPoYgy-A2Bng3ANkfIDTMuyfOBV3GPrHNbLe4BKIGzgIh4no9qlD6DS7qvpKu-4mCjQCJa3Cj2lEcNuO0Lu0ZUVYQSbFvjJLdiE12s"/>
</div>
<div class="flex-grow">
<p class="font-body-lg text-body-lg font-semibold">Cherry Tomatoes</p>
<p class="font-body-md text-label-sm text-outline">50g • 15 kcal</p>
</div>
<div class="flex flex-col items-end">
<span class="material-symbols-outlined text-outline cursor-pointer hover:text-error transition-colors" data-icon="close">close</span>
</div>
</div>
</div>
<!-- Add Ingredient Button -->
<button class="w-full py-md border-2 border-dashed border-outline-variant rounded-xl flex items-center justify-center gap-sm text-outline hover:text-primary-container hover:border-primary-container transition-all active:scale-[0.98] mt-md">
<span class="material-symbols-outlined" data-icon="add">add</span>
<span class="font-label-lg text-label-lg">+ Add Ingredient</span>
</button>
</div>
<!-- Totals Card -->
<div class="mt-xl bg-primary-container/10 border border-primary-container/20 rounded-2xl p-lg">
<div class="flex justify-between items-end mb-md">
<div>
<h3 class="font-label-sm text-label-sm text-on-primary-container/70 uppercase">Total Calories</h3>
<p class="font-headline-lg text-headline-lg text-on-primary-container">485 kcal</p>
</div>
<div class="bg-primary-container text-white px-md py-xs rounded-full font-label-sm text-label-sm">
                    Per Serving
                </div>
</div>
<div class="grid grid-cols-3 gap-md pt-md border-t border-primary-container/10">
<div class="text-center">
<p class="font-label-sm text-label-sm text-on-primary-container/60">Protein</p>
<p class="font-body-lg text-body-lg font-bold text-on-primary-container">12g</p>
<div class="w-full bg-white/50 h-1.5 rounded-full mt-xs overflow-hidden">
<div class="bg-primary-container h-full rounded-full" style="width: 45%;"></div>
</div>
</div>
<div class="text-center">
<p class="font-label-sm text-label-sm text-on-primary-container/60">Carbs</p>
<p class="font-body-lg text-body-lg font-bold text-on-primary-container">58g</p>
<div class="w-full bg-white/50 h-1.5 rounded-full mt-xs overflow-hidden">
<div class="bg-primary-container h-full rounded-full" style="width: 75%;"></div>
</div>
</div>
<div class="text-center">
<p class="font-label-sm text-label-sm text-on-primary-container/60">Fat</p>
<p class="font-body-lg text-body-lg font-bold text-on-primary-container">22g</p>
<div class="w-full bg-white/50 h-1.5 rounded-full mt-xs overflow-hidden">
<div class="bg-primary-container h-full rounded-full" style="width: 30%;"></div>
</div>
</div>
</div>
</div>
<!-- Action Button -->
<div class="mt-xl mb-32">
<button class="w-full bg-primary-container text-white font-headline-md text-body-lg py-md rounded-full shadow-lg hover:shadow-primary-container/20 active:scale-95 transition-all">
                Save Recipe
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-2xl bg-white/95 dark:bg-gray-900/95 backdrop-blur-md border-t border-gray-100 dark:border-gray-800 shadow-[0_-4px_12px_rgba(0,0,0,0.04)]">
<div class="flex justify-around items-center h-20 px-2 pb-safe w-full">
<a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 px-4 py-1 hover:text-green-500 dark:hover:text-green-300 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
<span class="font-lexend text-[12px] font-medium">Log</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 px-4 py-1 hover:text-green-500 dark:hover:text-green-300 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="barcode_scanner">barcode_scanner</span>
<span class="font-lexend text-[12px] font-medium">Scan</span>
</a>
<a class="flex flex-col items-center justify-center bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400 rounded-xl px-4 py-1 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="menu_book" style="font-variation-settings: 'FILL' 1;">menu_book</span>
<span class="font-lexend text-[12px] font-medium">Recipes</span>
</a>
</div>
</nav>
<!-- FAB (Suppressed as per rules for Details/Settings screens, but here intent is a focused builder task) -->
</body></html>
