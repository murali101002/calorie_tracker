<style>
        .scan-overlay {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
        }
        .reticle-container {
            position: relative;
            width: 260px;
            height: 200px;
        }
        .corner {
            position: absolute;
            width: 32px;
            height: 32px;
            border: 4px solid #22c55e;
        }
        .top-left { top: -2px; left: -2px; border-right: 0; border-bottom: 0; border-radius: 12px 0 0 0; }
        .top-right { top: -2px; right: -2px; border-left: 0; border-bottom: 0; border-radius: 0 12px 0 0; }
        .bottom-left { bottom: -2px; left: -2px; border-right: 0; border-top: 0; border-radius: 0 0 0 12px; }
        .bottom-right { bottom: -2px; right: -2px; border-left: 0; border-top: 0; border-radius: 0 0 12px 0; }
        
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #22c55e;
            box-shadow: 0 0 12px #22c55e;
            top: 0;
            left: 0;
            animation: scanning 2.5s ease-in-out infinite;
        }
        @keyframes scanning {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black font-body-md text-on-surface overflow-hidden h-screen w-screen">
<div class="fixed inset-0 z-0">
<img alt="Close-up POV of a hand holding a food package with a visible barcode, slightly blurred cinematic lighting" class="w-full h-full object-cover opacity-80" data-alt="cinematic first-person perspective of a hand holding a cereal box showing a barcode in a bright modern kitchen setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBrJr2jxQbL3R755DmpSzAbif6r1zUA2mm8ZqZylfPp2PIbhdDKTBvS7Ek7NK19_OGP00-MRDa3EFUYF1WuEnS-HtGJveyt5aekxXig3oWjBAt01ENAiwQUMOqbQbUXPC6H7wwffPOvj88p0Qj9fikwTCIjLIln6vJFmi7hvANSP5Fo_09oPQgA797AnzLNzTPPHONnNyEsMGZHEiLQLVwQVdWtRdl5_OSQh5kbfscimINTcn3GrdAZo0B21yjbbGYga7Y-a03UVdg"/>
</div>
<div class="fixed inset-0 z-10 flex flex-col items-center">
<header class="w-full h-20 px-4 flex items-center justify-between z-20">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-black/30 backdrop-blur-md text-white active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[28px]" data-icon="close">close</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-black/30 backdrop-blur-md text-white active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[28px]" data-icon="flashlight_on">flashlight_on</span>
</button>
</header>
<div class="flex-1 w-full flex flex-col items-center justify-center">
<div class="scan-overlay absolute inset-0 pointer-events-none"></div>
<div class="z-20 relative flex flex-col items-center">
<div class="reticle-container bg-transparent">
<div class="corner top-left"></div>
<div class="corner top-right"></div>
<div class="corner bottom-left"></div>
<div class="corner bottom-right"></div>
<div class="scan-line"></div>
</div>
<div class="mt-8 text-center px-8">
<p class="font-label-lg text-white drop-shadow-md tracking-wide">
                        Point at barcode
                    </p>
<p class="font-body-md text-white/70 mt-2 max-w-[240px]">
                        Align the barcode within the frame to scan automatically
                    </p>
</div>
</div>
</div>
<footer class="w-full h-40 flex flex-col items-center justify-start z-20">
<button class="flex items-center gap-3 px-8 py-4 rounded-full bg-primary-container text-on-primary-container font-label-lg shadow-lg active:scale-95 transition-transform mb-6">
<span class="material-symbols-outlined" data-icon="search">search</span>
                Search manually
            </button>
<div class="flex gap-12 text-white/50">
<div class="flex flex-col items-center gap-1 opacity-100 text-white">
<span class="material-symbols-outlined text-2xl" data-icon="barcode_scanner" style="font-variation-settings: 'FILL' 1;">barcode_scanner</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Barcode</span>
</div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-2xl" data-icon="fastfood">fastfood</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Vision</span>
</div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-2xl" data-icon="history">history</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Recent</span>
</div>
</div>
</footer>
</div>
<div class="fixed top-1/2 right-4 transform -translate-y-1/2 flex flex-col gap-6 z-20">
<div class="w-1.5 h-32 bg-white/20 rounded-full relative overflow-hidden">
<div class="absolute top-1/4 left-0 w-full h-1/2 bg-primary-container rounded-full"></div>
</div>
<span class="material-symbols-outlined text-white/40" data-icon="zoom_in">zoom_in</span>
</div>
</body></html>
