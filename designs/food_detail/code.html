<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-background": "#0b1c30",
                    "primary-fixed": "#6bff8f",
                    "on-primary": "#ffffff",
                    "surface-variant": "#d3e4fe",
                    "on-tertiary": "#ffffff",
                    "surface-dim": "#cbdbf5",
                    "inverse-primary": "#4ae176",
                    "outline-variant": "#bccbb9",
                    "secondary": "#006c49",
                    "surface-tint": "#006e2f",
                    "primary-container": "#22c55e",
                    "surface-container": "#e5eeff",
                    "error": "#ba1a1a",
                    "secondary-fixed-dim": "#4edea3",
                    "surface-container-highest": "#d3e4fe",
                    "on-tertiary-fixed": "#001a42",
                    "on-error": "#ffffff",
                    "inverse-surface": "#213145",
                    "on-tertiary-container": "#003d88",
                    "on-secondary": "#ffffff",
                    "on-primary-container": "#004b1e",
                    "inverse-on-surface": "#eaf1ff",
                    "primary": "#006e2f",
                    "surface": "#f8f9ff",
                    "surface-container-high": "#dce9ff",
                    "on-surface-variant": "#3d4a3d",
                    "tertiary": "#005ac2",
                    "on-error-container": "#93000a",
                    "on-primary-fixed-variant": "#005321",
                    "secondary-fixed": "#6ffbbe",
                    "surface-container-low": "#eff4ff",
                    "tertiary-container": "#82abff",
                    "tertiary-fixed": "#d8e2ff",
                    "surface-bright": "#f8f9ff",
                    "error-container": "#ffdad6",
                    "background": "#f8f9ff",
                    "primary-fixed-dim": "#4ae176",
                    "tertiary-fixed-dim": "#adc6ff",
                    "secondary-container": "#6cf8bb",
                    "surface-container-lowest": "#ffffff",
                    "on-surface": "#0b1c30",
                    "on-secondary-fixed-variant": "#005236",
                    "on-tertiary-fixed-variant": "#004395",
                    "on-primary-fixed": "#002109",
                    "on-secondary-container": "#00714d",
                    "outline": "#6d7b6c",
                    "on-secondary-fixed": "#002113"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "4px",
                    "gutter-mobile": "16px",
                    "base": "4px",
                    "sm": "8px",
                    "lg": "24px",
                    "md": "16px",
                    "margin-mobile": "16px",
                    "xl": "32px"
            },
            "fontFamily": {
                    "body-md": ["Lexend"],
                    "headline-lg": ["Lexend"],
                    "label-sm": ["Lexend"],
                    "body-lg": ["Lexend"],
                    "label-lg": ["Lexend"],
                    "headline-md": ["Lexend"]
            },
            "fontSize": {
                    "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.04em", "fontWeight": "500"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0", "fontWeight": "400"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body-md text-on-background min-h-screen flex flex-col">
<!-- Top Navigation (Shell Implementation) -->
<header class="w-full top-0 sticky z-50 bg-white dark:bg-gray-900 border-b border-gray-100 dark:border-gray-800 shadow-sm dark:shadow-none h-16 flex items-center justify-between px-4">
<div class="flex items-center gap-3">
<button class="hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined text-gray-900 dark:text-white">arrow_back</span>
</button>
<div class="flex flex-col">
<span class="font-lexend text-gray-900 dark:text-white font-semibold text-lg">Product Details</span>
</div>
</div>
<div class="flex items-center gap-2">
<button class="hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined text-gray-900 dark:text-white">favorite</span>
</button>
<button class="hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined text-gray-900 dark:text-white">share</span>
</button>
</div>
</header>
<main class="flex-1 max-w-2xl mx-auto w-full px-margin-mobile py-lg">
<!-- Hero Branding Section -->
<section class="mb-xl flex items-start gap-md">
<div class="relative h-24 w-24 rounded-2xl overflow-hidden flex-shrink-0 bg-surface-container-low shadow-sm">
<img alt="Greek Yogurt Bowl" class="h-full w-full object-cover" data-alt="close-up of creamy white greek yogurt in a glass bowl with fresh blueberries and a honey drizzle in bright morning light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB1FavCFm9apnxEQHTsJyFZ5lYpckXrnkAEfFOCrqp8Cj9d0DV1v0v5Vj44_LmYAtQuje2F7oR1LP0IGIzgPdcV-eHMhCILn7oIAJMGALnY-YjqxSS6DWi8Z3vf1TegZaf8x6F7pjCW5HoyJQLFrbqx6aLFMgP1bjAp8tHfd4voyyWVVEVKvo104pTT5C7T2iJJH45f5EDWO55wc8QaF2xiUL3OxK8wbhzzv_6-rNLSL3tADbFUgrY7tx-0H_rdVC7VKKNkFK7c8SA"/>
</div>
<div class="flex flex-col justify-center h-24">
<p class="font-label-lg text-primary uppercase tracking-wider mb-xs">Organic Farms</p>
<h1 class="font-headline-md text-on-background">Greek Yogurt, Plain</h1>
<p class="font-body-md text-outline">0% Fat • High Protein</p>
</div>
</section>
<!-- Input Section: Serving Size & Meal -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-md mb-xl">
<!-- Serving Size -->
<div class="bg-surface-container-lowest p-md rounded-xl border border-outline-variant shadow-[0_4px_12px_rgba(0,0,0,0.04)]">
<label class="font-label-sm text-outline block mb-sm">Serving Size</label>
<div class="flex items-center gap-sm">
<input class="w-1/3 bg-surface text-headline-md font-headline-md border-none rounded-lg focus:ring-2 focus:ring-primary-container p-2 text-center" placeholder="1" type="number" value="1"/>
<div class="flex-1 relative">
<select class="w-full appearance-none bg-surface border-none font-body-lg rounded-lg focus:ring-2 focus:ring-primary-container p-2 pr-10">
<option>Cup (245g)</option>
<option>Container (150g)</option>
<option>Ounce (28g)</option>
<option>Grams (1g)</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-outline">expand_more</span>
</div>
</div>
</div>
<!-- Meal Type Chip Toggle -->
<div class="bg-surface-container-lowest p-md rounded-xl border border-outline-variant shadow-[0_4px_12px_rgba(0,0,0,0.04)]">
<label class="font-label-sm text-outline block mb-sm">Log to Meal</label>
<div class="flex flex-wrap gap-xs">
<button class="px-md py-sm bg-primary-container text-on-primary-container font-label-lg rounded-full active:scale-95 transition-all">Breakfast</button>
<button class="px-md py-sm bg-surface text-outline font-label-lg rounded-full border border-outline-variant hover:border-primary active:scale-95 transition-all">Lunch</button>
<button class="px-md py-sm bg-surface text-outline font-label-lg rounded-full border border-outline-variant hover:border-primary active:scale-95 transition-all">Dinner</button>
<button class="px-md py-sm bg-surface text-outline font-label-lg rounded-full border border-outline-variant hover:border-primary active:scale-95 transition-all">Snack</button>
</div>
</div>
</section>
<!-- Nutrition Dashboard (Bento Style) -->
<section class="grid grid-cols-12 gap-md mb-xl">
<!-- Main Calories Card -->
<div class="col-span-12 md:col-span-4 bg-primary-container text-on-primary-container p-xl rounded-2xl flex flex-col items-center justify-center relative overflow-hidden">
<div class="absolute -right-4 -top-4 opacity-10">
<span class="material-symbols-outlined text-[120px]">bolt</span>
</div>
<p class="font-label-lg mb-xs opacity-90">Energy</p>
<h2 class="text-[56px] font-headline-lg leading-none">120</h2>
<p class="font-label-lg tracking-[0.2em] mt-xs">KCAL</p>
</div>
<!-- Macro Grid -->
<div class="col-span-12 md:col-span-8 grid grid-cols-2 md:grid-cols-4 gap-md">
<!-- Protein -->
<div class="bg-surface-container-lowest p-md rounded-xl border border-outline-variant shadow-sm flex flex-col items-center">
<div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-blue-600 text-lg">fitness_center</span>
</div>
<span class="font-headline-md text-on-background">22g</span>
<span class="font-label-sm text-outline">Protein</span>
<div class="w-full bg-blue-100 h-1 rounded-full mt-sm">
<div class="bg-blue-600 h-full rounded-full" style="width: 75%"></div>
</div>
</div>
<!-- Carbs -->
<div class="bg-surface-container-lowest p-md rounded-xl border border-outline-variant shadow-sm flex flex-col items-center">
<div class="w-10 h-10 rounded-full bg-amber-50 flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-amber-600 text-lg">bakery_dining</span>
</div>
<span class="font-headline-md text-on-background">9g</span>
<span class="font-label-sm text-outline">Carbs</span>
<div class="w-full bg-amber-100 h-1 rounded-full mt-sm">
<div class="bg-amber-600 h-full rounded-full" style="width: 30%"></div>
</div>
</div>
<!-- Fats -->
<div class="bg-surface-container-lowest p-md rounded-xl border border-outline-variant shadow-sm flex flex-col items-center">
<div class="w-10 h-10 rounded-full bg-red-50 flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-red-600 text-lg">opacity</span>
</div>
<span class="font-headline-md text-on-background">0g</span>
<span class="font-label-sm text-outline">Fat</span>
<div class="w-full bg-red-100 h-1 rounded-full mt-sm">
<div class="bg-red-600 h-full rounded-full" style="width: 2%"></div>
</div>
</div>
<!-- Fiber -->
<div class="bg-surface-container-lowest p-md rounded-xl border border-outline-variant shadow-sm flex flex-col items-center">
<div class="w-10 h-10 rounded-full bg-green-50 flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-green-600 text-lg">grass</span>
</div>
<span class="font-headline-md text-on-background">0.5g</span>
<span class="font-label-sm text-outline">Fiber</span>
<div class="w-full bg-green-100 h-1 rounded-full mt-sm">
<div class="bg-green-600 h-full rounded-full" style="width: 10%"></div>
</div>
</div>
</div>
</section>
<!-- Detailed Breakdown -->
<section class="mb-xl">
<h3 class="font-label-lg text-on-background mb-md">Additional Info</h3>
<div class="space-y-sm">
<div class="flex justify-between items-center py-sm border-b border-outline-variant">
<span class="font-body-md text-outline">Sodium</span>
<span class="font-body-lg text-on-background">45mg</span>
</div>
<div class="flex justify-between items-center py-sm border-b border-outline-variant">
<span class="font-body-md text-outline">Sugars</span>
<span class="font-body-lg text-on-background">6g</span>
</div>
<div class="flex justify-between items-center py-sm border-b border-outline-variant">
<span class="font-body-md text-outline">Calcium</span>
<span class="font-body-lg text-on-background">20% DV</span>
</div>
</div>
</section>
</main>
<!-- Bottom Actions Container -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-xl border-t border-gray-100 z-50">
<div class="max-w-2xl mx-auto">
<button class="w-full bg-primary-container text-on-primary font-headline-md h-14 rounded-full flex items-center justify-center gap-sm shadow-lg shadow-primary/20 active:scale-95 duration-200 transition-all">
<span class="material-symbols-outlined" data-weight="fill">add_circle</span>
                Add to Log
            </button>
</div>
</div>
<!-- Padding for bottom button -->
<div class="h-24"></div>
</body></html>
